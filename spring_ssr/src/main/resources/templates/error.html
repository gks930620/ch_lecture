<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${status} + ' 오류'">오류</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background-color: #fafafa; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .error-box { text-align: center; padding: 40px; }
        .error-code { font-size: 80px; font-weight: 700; color: #6200ea; line-height: 1; }
        .error-message { font-size: 18px; color: #424242; margin: 16px 0 32px; }
        .btn { padding: 12px 24px; background-color: #6200ea; color: white; border-radius: 4px; text-decoration: none; font-size: 14px; font-weight: 500; }
        .btn:hover { background-color: #5000ca; }
    </style>
</head>
<body>
    <div class="error-box">
        <div class="error-code" th:text="${status}">500</div>
        <div class="error-message" th:text="${message}">오류가 발생했습니다.</div>
        <a href="/" class="btn">홈으로 돌아가기</a>
    </div>
</body>
</html>
