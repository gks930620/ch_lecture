<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background-color: #fafafa; min-height: 100vh; display: flex; flex-direction: column; }
        .app-header { background-color: #6200ea; color: white; padding: 0 16px; }
        .header-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .header-logo { display: flex; align-items: center; gap: 8px; font-size: 20px; font-weight: 500; text-decoration: none; color: white; }
        .header-logo .material-icons { font-size: 28px; }
        .nav-item { padding: 8px 16px; border-radius: 4px; text-decoration: none; color: white; font-size: 14px; font-weight: 500; display: inline-flex; align-items: center; gap: 4px; }
        .nav-item:hover { background-color: rgba(255,255,255,0.1); }

        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
        .signup-box { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 100%; max-width: 400px; padding: 40px; }
        .signup-title { text-align: center; font-size: 24px; font-weight: 500; color: #212121; margin-bottom: 32px; }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; font-weight: 500; color: #424242; margin-bottom: 8px; }
        .form-input { width: 100%; padding: 12px 16px; border: 1px solid #e0e0e0; border-radius: 4px; font-size: 14px; outline: none; }
        .form-input:focus { border-color: #6200ea; }

        .error-msg { background-color: #ffebee; color: #c62828; padding: 12px 16px; border-radius: 4px; font-size: 14px; margin-bottom: 20px; }

        .btn { width: 100%; padding: 12px; border-radius: 4px; border: none; font-size: 15px; font-weight: 500; cursor: pointer; }
        .btn-primary { background-color: #6200ea; color: white; }
        .btn-primary:hover { background-color: #5000ca; }

        .login-link { text-align: center; font-size: 14px; color: #757575; margin-top: 16px; }
        .login-link a { color: #6200ea; text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="header-container">
            <div class="header-left">
                <a href="/" class="header-logo">
                    <span class="material-icons">code</span>
                    <span>Boilerplate</span>
                </a>
                <a href="/community" class="nav-item">
                    <span class="material-icons">forum</span>
                    커뮤니티
                </a>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="signup-box">
            <h1 class="signup-title">회원가입</h1>

            <div class="error-msg" th:if="${error}" th:text="${error}"></div>

            <form action="/signup" method="post">
                <div class="form-group">
                    <label class="form-label" for="username">아이디</label>
                    <input class="form-input" type="text" id="username" name="username"
                           placeholder="아이디를 입력하세요" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">비밀번호</label>
                    <input class="form-input" type="password" id="password" name="password"
                           placeholder="비밀번호를 입력하세요" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="nickname">닉네임</label>
                    <input class="form-input" type="text" id="nickname" name="nickname"
                           placeholder="닉네임을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">이메일 (선택)</label>
                    <input class="form-input" type="email" id="email" name="email"
                           placeholder="이메일을 입력하세요">
                </div>
                <button type="submit" class="btn btn-primary">회원가입</button>
            </form>

            <div class="login-link">
                이미 계정이 있으신가요? <a href="/login">로그인</a>
            </div>
        </div>
    </main>
</body>
</html>
