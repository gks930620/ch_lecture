<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background-color: #fafafa; min-height: 100vh; display: flex; flex-direction: column; }
        .app-header { background-color: #6200ea; color: white; padding: 0 16px; }
        .header-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .header-logo { display: flex; align-items: center; gap: 8px; font-size: 20px; font-weight: 500; text-decoration: none; color: white; }
        .header-logo .material-icons { font-size: 28px; }
        .nav-item { padding: 8px 16px; border-radius: 4px; text-decoration: none; color: white; font-size: 14px; font-weight: 500; display: inline-flex; align-items: center; gap: 4px; }
        .nav-item:hover { background-color: rgba(255,255,255,0.1); }

        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
        .login-box { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 100%; max-width: 400px; padding: 40px; }
        .login-title { text-align: center; font-size: 24px; font-weight: 500; color: #212121; margin-bottom: 32px; }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; font-weight: 500; color: #424242; margin-bottom: 8px; }
        .form-input { width: 100%; padding: 12px 16px; border: 1px solid #e0e0e0; border-radius: 4px; font-size: 14px; outline: none; }
        .form-input:focus { border-color: #6200ea; }

        .error-msg { background-color: #ffebee; color: #c62828; padding: 12px 16px; border-radius: 4px; font-size: 14px; margin-bottom: 20px; }

        .btn { width: 100%; padding: 12px; border-radius: 4px; border: none; font-size: 15px; font-weight: 500; cursor: pointer; }
        .btn-primary { background-color: #6200ea; color: white; margin-bottom: 12px; }
        .btn-primary:hover { background-color: #5000ca; }

        .divider { display: flex; align-items: center; margin: 24px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #e0e0e0; }
        .divider span { padding: 0 12px; font-size: 13px; color: #9e9e9e; }

        .btn-social { width: 100%; padding: 12px; border-radius: 4px; border: 1px solid #e0e0e0; font-size: 15px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; margin-bottom: 8px; }
        .btn-kakao { background-color: #FEE500; color: #000000; border-color: #FEE500; }
        .btn-kakao:hover { background-color: #FDD835; }
        .btn-google { background-color: #ffffff; color: #757575; border-color: #dadce0; }
        .btn-google:hover { background-color: #f7f8f8; }

        .signup-link { text-align: center; font-size: 14px; color: #757575; margin-top: 16px; }
        .signup-link a { color: #6200ea; text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="header-container">
            <div class="header-left">
                <a href="/" class="header-logo">
                    <span class="material-icons">code</span>
                    <span>Boilerplate</span>
                </a>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="login-box">
            <h1 class="login-title">로그인</h1>

            <div class="error-msg" th:if="${error}" th:text="${error}"></div>

            <form action="/loginProc" method="post">
                <div class="form-group">
                    <label class="form-label" for="username">아이디</label>
                    <input class="form-input" type="text" id="username" name="username"
                           placeholder="아이디를 입력하세요" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">비밀번호</label>
                    <input class="form-input" type="password" id="password" name="password"
                           placeholder="비밀번호를 입력하세요" required>
                </div>
                <button type="submit" class="btn btn-primary">로그인</button>
            </form>

            <!-- OAuth2 소셜 로그인 -->
            <div class="divider"><span>또는</span></div>

            <!-- 카카오 로그인: /oauth2/authorization/kakao → Security가 카카오 인증서버로 redirect -->
            <a href="/oauth2/authorization/kakao" class="btn-social btn-kakao">
                <span>🟡</span> 카카오로 로그인
            </a>

            <!-- 구글 로그인: /oauth2/authorization/google → Security가 구글 인증서버로 redirect -->
            <a href="/oauth2/authorization/google" class="btn-social btn-google">
                <span>🔵</span> Google로 로그인
            </a>

            <div class="signup-link">
                계정이 없으신가요? <a href="/signup">회원가입</a>
            </div>
        </div>
    </main>
</body>
</html>
