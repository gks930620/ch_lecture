<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520">
  <rect width="1180" height="520" fill="#f8fafc"/>
  <text x="590" y="44" text-anchor="middle" font-size="30" font-family="Arial" fill="#0f172a">String Reference and String Pool</text>

  <rect x="60" y="90" width="300" height="380" rx="14" fill="#e2e8f0" stroke="#64748b" stroke-width="3"/>
  <text x="210" y="125" text-anchor="middle" font-size="22" font-family="Arial" fill="#334155">Stack (local refs)</text>

  <rect x="95" y="160" width="230" height="60" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="120" y="196" font-size="20" font-family="Courier New" fill="#1e3a8a">a -></text>

  <rect x="95" y="240" width="230" height="60" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="120" y="276" font-size="20" font-family="Courier New" fill="#1e3a8a">b -></text>

  <rect x="95" y="320" width="230" height="60" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="120" y="356" font-size="20" font-family="Courier New" fill="#991b1b">c -></text>

  <rect x="420" y="90" width="700" height="190" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="770" y="125" text-anchor="middle" font-size="22" font-family="Arial" fill="#166534">Heap / String Pool Area</text>

  <rect x="470" y="160" width="270" height="80" rx="10" fill="#bbf7d0" stroke="#15803d" stroke-width="2"/>
  <text x="605" y="206" text-anchor="middle" font-size="24" font-family="Courier New" fill="#14532d">"hello"</text>

  <rect x="790" y="160" width="270" height="80" rx="10" fill="#fecaca" stroke="#dc2626" stroke-width="2"/>
  <text x="925" y="197" text-anchor="middle" font-size="22" font-family="Courier New" fill="#7f1d1d">new String("hello")</text>
  <text x="925" y="220" text-anchor="middle" font-size="14" font-family="Arial" fill="#7f1d1d">separate object</text>

  <rect x="420" y="310" width="700" height="160" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="3"/>
  <text x="770" y="344" text-anchor="middle" font-size="20" font-family="Arial" fill="#312e81">Comparison semantics</text>
  <text x="460" y="382" font-size="18" font-family="Courier New" fill="#312e81">a == b  // true (same pooled object)</text>
  <text x="460" y="414" font-size="18" font-family="Courier New" fill="#312e81">a == c  // false (different object)</text>
  <text x="460" y="446" font-size="18" font-family="Courier New" fill="#312e81">a.equals(c)  // true (same content)</text>

  <g stroke="#334155" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <line x1="325" y1="190" x2="468" y2="190"/>
    <line x1="325" y1="270" x2="468" y2="190"/>
    <line x1="325" y1="350" x2="788" y2="190"/>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
  </defs>
</svg>
