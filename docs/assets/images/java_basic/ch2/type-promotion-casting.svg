<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520">
  <rect width="980" height="520" fill="#f8fafc"/>
  <text x="490" y="44" text-anchor="middle" font-size="30" font-family="Arial" fill="#0f172a">Primitive Promotion and Casting</text>

  <g font-family="Arial" font-size="20" fill="#1e293b" text-anchor="middle">
    <rect x="430" y="90" width="120" height="42" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="490" y="118">double</text>
    <rect x="430" y="150" width="120" height="42" rx="8" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
    <text x="490" y="178">float</text>
    <rect x="430" y="210" width="120" height="42" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="490" y="238">long</text>
    <rect x="430" y="270" width="120" height="42" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="490" y="298">int</text>
    <rect x="430" y="330" width="120" height="42" rx="8" fill="#e9d5ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="490" y="358">short</text>
    <rect x="430" y="390" width="120" height="42" rx="8" fill="#e9d5ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="490" y="418">byte</text>
  </g>

  <rect x="150" y="160" width="220" height="140" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="260" y="204" text-anchor="middle" font-size="22" font-family="Arial" fill="#166534">Widening</text>
  <text x="260" y="236" text-anchor="middle" font-size="18" font-family="Arial" fill="#166534">automatic</text>
  <text x="260" y="266" text-anchor="middle" font-size="16" font-family="Arial" fill="#166534">small -> large range</text>

  <rect x="610" y="160" width="220" height="140" rx="14" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
  <text x="720" y="204" text-anchor="middle" font-size="22" font-family="Arial" fill="#991b1b">Narrowing</text>
  <text x="720" y="236" text-anchor="middle" font-size="18" font-family="Arial" fill="#991b1b">explicit cast</text>
  <text x="720" y="266" text-anchor="middle" font-size="16" font-family="Arial" fill="#991b1b">possible data loss</text>

  <g stroke="#166534" stroke-width="3" fill="none" marker-end="url(#arrowGreen)">
    <line x1="400" y1="410" x2="380" y2="410"/>
    <line x1="380" y1="410" x2="380" y2="110"/>
    <line x1="380" y1="110" x2="428" y2="110"/>
  </g>

  <g stroke="#991b1b" stroke-width="3" fill="none" marker-end="url(#arrowRed)">
    <line x1="580" y1="110" x2="600" y2="110"/>
    <line x1="600" y1="110" x2="600" y2="410"/>
    <line x1="600" y1="410" x2="552" y2="410"/>
  </g>

  <text x="490" y="488" text-anchor="middle" font-size="18" font-family="Arial" fill="#334155">In arithmetic, byte/short/char are promoted to int first.</text>

  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#166534"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#991b1b"/>
    </marker>
  </defs>
</svg>
