<svg xmlns="http://www.w3.org/2000/svg" width="1140" height="460" viewBox="0 0 1140 460">
  <rect width="1140" height="460" fill="#f8fafc"/>
  <text x="570" y="42" text-anchor="middle" font-size="30" font-family="Arial" fill="#0f172a">Array Index and Memory-Like Layout</text>

  <rect x="80" y="90" width="980" height="300" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="3"/>

  <text x="110" y="142" font-size="20" font-family="Courier New" fill="#312e81">int[] scores = {90, 80, 75, 100, 88};</text>

  <g font-family="Arial" text-anchor="middle">
    <rect x="160" y="190" width="150" height="90" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <rect x="310" y="190" width="150" height="90" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <rect x="460" y="190" width="150" height="90" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <rect x="610" y="190" width="150" height="90" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <rect x="760" y="190" width="150" height="90" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>

    <text x="235" y="245" font-size="28" fill="#1e3a8a">90</text>
    <text x="385" y="245" font-size="28" fill="#1e3a8a">80</text>
    <text x="535" y="245" font-size="28" fill="#1e3a8a">75</text>
    <text x="685" y="245" font-size="28" fill="#1e3a8a">100</text>
    <text x="835" y="245" font-size="28" fill="#1e3a8a">88</text>

    <text x="235" y="305" font-size="16" fill="#334155">index 0</text>
    <text x="385" y="305" font-size="16" fill="#334155">index 1</text>
    <text x="535" y="305" font-size="16" fill="#334155">index 2</text>
    <text x="685" y="305" font-size="16" fill="#334155">index 3</text>
    <text x="835" y="305" font-size="16" fill="#334155">index 4</text>
  </g>

  <text x="160" y="360" font-size="18" font-family="Arial" fill="#334155">Valid index range: 0 to length-1</text>
  <text x="160" y="388" font-size="18" font-family="Arial" fill="#334155">Accessing index 5 here throws ArrayIndexOutOfBoundsException</text>
</svg>

