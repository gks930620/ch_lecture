<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520">
  <rect width="1180" height="520" fill="#f8fafc"/>
  <text x="590" y="44" text-anchor="middle" font-size="30" font-family="Arial" fill="#0f172a">Method Call and Scope (Stack Frames)</text>

  <rect x="70" y="90" width="500" height="380" rx="14" fill="#e2e8f0" stroke="#475569" stroke-width="3"/>
  <text x="320" y="126" text-anchor="middle" font-size="22" font-family="Arial" fill="#334155">Call Stack</text>

  <rect x="120" y="150" width="400" height="86" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="140" y="184" font-size="18" font-family="Courier New" fill="#1e3a8a">main()</text>
  <text x="140" y="210" font-size="15" font-family="Courier New" fill="#1e3a8a">args, local variables</text>

  <rect x="120" y="252" width="400" height="86" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="140" y="286" font-size="18" font-family="Courier New" fill="#166534">calculateTotal(price, qty)</text>
  <text x="140" y="312" font-size="15" font-family="Courier New" fill="#166534">parameters + local variables</text>

  <rect x="120" y="354" width="400" height="86" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="140" y="388" font-size="18" font-family="Courier New" fill="#991b1b">validate(qty)</text>
  <text x="140" y="414" font-size="15" font-family="Courier New" fill="#991b1b">temporary scope (block-local)</text>

  <rect x="640" y="90" width="470" height="380" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="3"/>
  <text x="875" y="126" text-anchor="middle" font-size="22" font-family="Arial" fill="#312e81">Scope Rule</text>
  <text x="680" y="174" font-size="18" font-family="Arial" fill="#312e81">1) Variables live only inside their block.</text>
  <text x="680" y="208" font-size="18" font-family="Arial" fill="#312e81">2) Method parameters are local to that method.</text>
  <text x="680" y="242" font-size="18" font-family="Arial" fill="#312e81">3) Each method call creates a new frame.</text>
  <text x="680" y="276" font-size="18" font-family="Arial" fill="#312e81">4) Return pops current frame from stack.</text>
  <text x="680" y="320" font-size="18" font-family="Arial" fill="#312e81">Java argument passing: always pass-by-value</text>
  <text x="680" y="350" font-size="16" font-family="Arial" fill="#312e81">primitive: value copied, reference: reference value copied</text>
</svg>

