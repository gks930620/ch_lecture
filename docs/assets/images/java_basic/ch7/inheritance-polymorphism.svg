<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="520" viewBox="0 0 1160 520">
  <rect width="1160" height="520" fill="#f8fafc"/>
  <text x="580" y="44" text-anchor="middle" font-size="30" font-family="Arial" fill="#0f172a">Inheritance and Polymorphic Dispatch</text>

  <rect x="70" y="90" width="500" height="380" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="3"/>
  <text x="320" y="126" text-anchor="middle" font-size="22" font-family="Arial" fill="#312e81">Type Hierarchy</text>
  <rect x="220" y="160" width="200" height="70" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="320" y="202" text-anchor="middle" font-size="22" font-family="Arial" fill="#1e3a8a">Animal</text>

  <rect x="120" y="280" width="160" height="70" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="200" y="322" text-anchor="middle" font-size="22" font-family="Arial" fill="#166534">Dog</text>
  <rect x="360" y="280" width="160" height="70" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="440" y="322" text-anchor="middle" font-size="22" font-family="Arial" fill="#166534">Cat</text>

  <g stroke="#334155" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <line x1="250" y1="280" x2="300" y2="232"/>
    <line x1="410" y1="280" x2="340" y2="232"/>
  </g>

  <rect x="620" y="90" width="470" height="380" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="3"/>
  <text x="855" y="126" text-anchor="middle" font-size="22" font-family="Arial" fill="#155e75">Runtime Dispatch</text>
  <text x="650" y="178" font-size="19" font-family="Courier New" fill="#155e75">Animal a1 = new Dog();</text>
  <text x="650" y="208" font-size="19" font-family="Courier New" fill="#155e75">Animal a2 = new Cat();</text>
  <text x="650" y="238" font-size="19" font-family="Courier New" fill="#155e75">a1.sound(); // Dog.sound()</text>
  <text x="650" y="268" font-size="19" font-family="Courier New" fill="#155e75">a2.sound(); // Cat.sound()</text>
  <text x="650" y="320" font-size="18" font-family="Arial" fill="#155e75">Reference type = Animal</text>
  <text x="650" y="348" font-size="18" font-family="Arial" fill="#155e75">Actual method = runtime object type</text>
</svg>

