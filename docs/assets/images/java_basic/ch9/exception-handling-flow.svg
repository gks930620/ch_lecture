<svg xmlns="http://www.w3.org/2000/svg" width="1140" height="540" viewBox="0 0 1140 540">
  <rect width="1140" height="540" fill="#f8fafc"/>
  <text x="570" y="44" text-anchor="middle" font-size="30" font-family="Arial" fill="#0f172a">Exception Propagation and Handling Flow</text>

  <rect x="80" y="90" width="980" height="400" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="3"/>

  <rect x="140" y="150" width="220" height="70" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="250" y="192" text-anchor="middle" font-size="20" font-family="Arial" fill="#1e3a8a">Controller</text>

  <rect x="430" y="150" width="220" height="70" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="540" y="192" text-anchor="middle" font-size="20" font-family="Arial" fill="#166534">Service</text>

  <rect x="720" y="150" width="220" height="70" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="830" y="192" text-anchor="middle" font-size="20" font-family="Arial" fill="#991b1b">Repository</text>

  <rect x="430" y="300" width="380" height="70" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="620" y="342" text-anchor="middle" font-size="20" font-family="Arial" fill="#92400e">catch / translate / rethrow</text>

  <rect x="430" y="400" width="380" height="60" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="620" y="437" text-anchor="middle" font-size="18" font-family="Arial" fill="#155e75">finally / try-with-resources: cleanup always</text>

  <g stroke="#334155" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <line x1="360" y1="185" x2="428" y2="185"/>
    <line x1="650" y1="185" x2="718" y2="185"/>
    <line x1="830" y1="220" x2="700" y2="298"/>
    <line x1="540" y1="300" x2="540" y2="222"/>
    <line x1="620" y1="370" x2="620" y2="398"/>
  </g>

  <text x="860" y="266" font-size="16" font-family="Arial" fill="#334155">Exception thrown</text>
  <text x="470" y="280" font-size="16" font-family="Arial" fill="#334155">Propagate up stack</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
  </defs>
</svg>

