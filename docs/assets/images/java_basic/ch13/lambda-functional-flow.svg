<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="480" viewBox="0 0 1160 480">
  <rect width="1160" height="480" fill="#f8fafc"/>
  <text x="580" y="42" text-anchor="middle" font-size="30" font-family="Arial" fill="#0f172a">Lambda and Functional Flow</text>

  <rect x="90" y="90" width="980" height="300" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="3"/>
  <g font-family="Arial" font-size="18" text-anchor="middle">
    <rect x="130" y="185" width="180" height="70" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="220" y="228" fill="#1e3a8a">Input Data</text>

    <rect x="350" y="185" width="180" height="70" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="440" y="228" fill="#166534">Predicate</text>

    <rect x="570" y="185" width="180" height="70" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="660" y="228" fill="#92400e">Function</text>

    <rect x="790" y="185" width="180" height="70" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="880" y="228" fill="#991b1b">Consumer</text>
  </g>

  <g stroke="#334155" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <line x1="310" y1="220" x2="348" y2="220"/>
    <line x1="530" y1="220" x2="568" y2="220"/>
    <line x1="750" y1="220" x2="788" y2="220"/>
  </g>

  <text x="580" y="440" text-anchor="middle" font-size="18" font-family="Arial" fill="#334155">
    Data + Behavior as parameters -> concise and composable code
  </text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
  </defs>
</svg>

