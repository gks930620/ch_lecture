<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="470" viewBox="0 0 1100 470">
  <rect width="1100" height="470" fill="#f8fafc"/>
  <text x="550" y="42" text-anchor="middle" font-size="30" font-family="Arial" fill="#0f172a">Shift Operators: &lt;&lt;, &gt;&gt;, &gt;&gt;&gt;</text>

  <rect x="70" y="90" width="960" height="330" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="3"/>

  <text x="110" y="140" font-size="21" font-family="Arial" fill="#312e81">Original (x = 3)</text>
  <text x="390" y="140" font-size="28" font-family="Courier New" fill="#312e81">00000000 00000000 00000000 00000011</text>

  <text x="110" y="210" font-size="21" font-family="Arial" fill="#166534">x &lt;&lt; 2  (left shift)</text>
  <text x="390" y="210" font-size="28" font-family="Courier New" fill="#166534">00000000 00000000 00000000 00001100  = 12</text>

  <text x="110" y="280" font-size="21" font-family="Arial" fill="#92400e">x &gt;&gt; 1  (signed right shift)</text>
  <text x="390" y="280" font-size="28" font-family="Courier New" fill="#92400e">00000000 00000000 00000000 00000001  = 1</text>

  <text x="110" y="350" font-size="21" font-family="Arial" fill="#991b1b">For negative values, &gt;&gt; keeps sign bit, &gt;&gt;&gt; fills with 0.</text>
  <text x="110" y="384" font-size="21" font-family="Arial" fill="#991b1b">Use &gt;&gt;&gt; carefully: result can become a large positive integer.</text>
</svg>
