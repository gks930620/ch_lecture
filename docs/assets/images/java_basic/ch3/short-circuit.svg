<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
  <rect width="1100" height="520" fill="#f8fafc"/>
  <text x="550" y="42" text-anchor="middle" font-size="30" font-family="Arial" fill="#0f172a">Short-Circuit Evaluation</text>

  <rect x="70" y="90" width="460" height="380" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="300" y="126" text-anchor="middle" font-size="24" font-family="Arial" fill="#166534">A && B</text>
  <text x="300" y="154" text-anchor="middle" font-size="15" font-family="Arial" fill="#166534">if A is false, B is not evaluated</text>

  <rect x="130" y="190" width="340" height="60" rx="10" fill="#bbf7d0" stroke="#15803d" stroke-width="2"/>
  <text x="300" y="228" text-anchor="middle" font-size="20" font-family="Arial" fill="#14532d">Evaluate A</text>
  <rect x="130" y="290" width="340" height="60" rx="10" fill="#bbf7d0" stroke="#15803d" stroke-width="2"/>
  <text x="300" y="328" text-anchor="middle" font-size="20" font-family="Arial" fill="#14532d">Evaluate B</text>

  <text x="100" y="272" font-size="16" font-family="Arial" fill="#14532d">A = true</text>
  <text x="360" y="272" font-size="16" font-family="Arial" fill="#14532d">A = false -> result false</text>

  <g stroke="#14532d" stroke-width="2.5" fill="none" marker-end="url(#arrowGreen)">
    <line x1="300" y1="250" x2="300" y2="288"/>
    <line x1="470" y1="220" x2="500" y2="220"/>
  </g>

  <rect x="570" y="90" width="460" height="380" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="800" y="126" text-anchor="middle" font-size="24" font-family="Arial" fill="#1e3a8a">A || B</text>
  <text x="800" y="154" text-anchor="middle" font-size="15" font-family="Arial" fill="#1e3a8a">if A is true, B is not evaluated</text>

  <rect x="630" y="190" width="340" height="60" rx="10" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="800" y="228" text-anchor="middle" font-size="20" font-family="Arial" fill="#1e3a8a">Evaluate A</text>
  <rect x="630" y="290" width="340" height="60" rx="10" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="800" y="328" text-anchor="middle" font-size="20" font-family="Arial" fill="#1e3a8a">Evaluate B</text>

  <text x="600" y="272" font-size="16" font-family="Arial" fill="#1e3a8a">A = false</text>
  <text x="850" y="272" font-size="16" font-family="Arial" fill="#1e3a8a">A = true -> result true</text>

  <g stroke="#1e3a8a" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)">
    <line x1="800" y1="250" x2="800" y2="288"/>
    <line x1="970" y1="220" x2="1000" y2="220"/>
  </g>

  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#14532d"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1e3a8a"/>
    </marker>
  </defs>
</svg>
