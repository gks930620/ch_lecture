<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="470" viewBox="0 0 1180 470">
  <rect width="1180" height="470" fill="#f8fafc"/>
  <text x="590" y="44" text-anchor="middle" font-size="30" font-family="Arial" fill="#0f172a">String Processing Pipeline</text>

  <rect x="80" y="90" width="1000" height="300" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="3"/>

  <g font-family="Arial" font-size="18" text-anchor="middle">
    <rect x="120" y="190" width="150" height="70" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="195" y="233" fill="#1e3a8a">Raw Input</text>

    <rect x="320" y="190" width="170" height="70" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="405" y="233" fill="#166534">trim/lowercase</text>

    <rect x="540" y="190" width="170" height="70" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="625" y="233" fill="#92400e">validate(regex)</text>

    <rect x="760" y="190" width="170" height="70" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="845" y="233" fill="#991b1b">split/parse</text>

    <rect x="980" y="190" width="80" height="70" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    <text x="1020" y="233" fill="#155e75">Result</text>
  </g>

  <g stroke="#334155" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <line x1="270" y1="225" x2="318" y2="225"/>
    <line x1="490" y1="225" x2="538" y2="225"/>
    <line x1="710" y1="225" x2="758" y2="225"/>
    <line x1="930" y1="225" x2="978" y2="225"/>
  </g>

  <text x="590" y="430" text-anchor="middle" font-size="18" font-family="Arial" fill="#334155">
    For many concatenations, use StringBuilder instead of repeated '+'.
  </text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
  </defs>
</svg>

