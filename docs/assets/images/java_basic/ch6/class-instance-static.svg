<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="500" viewBox="0 0 1160 500">
  <rect width="1160" height="500" fill="#f8fafc"/>
  <text x="580" y="44" text-anchor="middle" font-size="30" font-family="Arial" fill="#0f172a">Class, Instance, and static Members</text>

  <rect x="80" y="90" width="1000" height="360" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="3"/>

  <rect x="130" y="140" width="300" height="250" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="280" y="178" text-anchor="middle" font-size="22" font-family="Arial" fill="#1e3a8a">Class: User</text>
  <text x="160" y="220" font-size="18" font-family="Courier New" fill="#1e3a8a">static int userCount</text>
  <text x="160" y="250" font-size="18" font-family="Courier New" fill="#1e3a8a">User(String name)</text>
  <text x="160" y="280" font-size="18" font-family="Courier New" fill="#1e3a8a">String getName()</text>
  <text x="160" y="310" font-size="18" font-family="Courier New" fill="#1e3a8a">void rename(String)</text>

  <rect x="500" y="150" width="250" height="110" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="625" y="186" text-anchor="middle" font-size="20" font-family="Arial" fill="#166534">Instance: user1</text>
  <text x="530" y="220" font-size="17" font-family="Courier New" fill="#166534">name = "Kim"</text>

  <rect x="500" y="280" width="250" height="110" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="625" y="316" text-anchor="middle" font-size="20" font-family="Arial" fill="#166534">Instance: user2</text>
  <text x="530" y="350" font-size="17" font-family="Courier New" fill="#166534">name = "Lee"</text>

  <rect x="810" y="205" width="220" height="120" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="920" y="242" text-anchor="middle" font-size="20" font-family="Arial" fill="#991b1b">Shared static</text>
  <text x="840" y="276" font-size="18" font-family="Courier New" fill="#991b1b">userCount = 2</text>

  <g stroke="#334155" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <line x1="430" y1="220" x2="498" y2="205"/>
    <line x1="430" y1="300" x2="498" y2="335"/>
    <line x1="750" y1="205" x2="808" y2="245"/>
    <line x1="750" y1="335" x2="808" y2="285"/>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
  </defs>
</svg>

