<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="500" viewBox="0 0 1040 500">
  <rect width="1040" height="500" fill="#f8fafc"/>
  <text x="520" y="44" text-anchor="middle" font-size="30" font-family="Arial" fill="#0f172a">for-loop Lifecycle</text>

  <rect x="430" y="90" width="180" height="60" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="520" y="128" text-anchor="middle" font-size="21" font-family="Arial" fill="#1e3a8a">Initialization</text>

  <polygon points="520,190 640,250 520,310 400,250" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
  <text x="520" y="257" text-anchor="middle" font-size="21" font-family="Arial" fill="#92400e">Condition?</text>

  <rect x="720" y="220" width="170" height="60" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
  <text x="805" y="258" text-anchor="middle" font-size="21" font-family="Arial" fill="#991b1b">Exit loop</text>

  <rect x="430" y="350" width="180" height="60" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="520" y="388" text-anchor="middle" font-size="21" font-family="Arial" fill="#166534">Body</text>

  <rect x="150" y="350" width="180" height="60" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
  <text x="240" y="388" text-anchor="middle" font-size="21" font-family="Arial" fill="#4c1d95">Update</text>

  <g stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <line x1="520" y1="150" x2="520" y2="188"/>
    <line x1="640" y1="250" x2="718" y2="250"/>
    <line x1="520" y1="310" x2="520" y2="348"/>
    <line x1="430" y1="380" x2="332" y2="380"/>
    <line x1="240" y1="350" x2="240" y2="250"/>
    <line x1="240" y1="250" x2="398" y2="250"/>
  </g>

  <text x="660" y="236" font-size="16" font-family="Arial" fill="#334155">false</text>
  <text x="540" y="330" font-size="16" font-family="Arial" fill="#334155">true</text>
  <text x="520" y="468" text-anchor="middle" font-size="18" font-family="Arial" fill="#334155">
    init -> condition -> body -> update -> condition -> ...
  </text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
  </defs>
</svg>
