<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#f8fafc"/>
  <text x="600" y="44" text-anchor="middle" font-size="30" font-family="Arial" fill="#0f172a">Control Flow Decision Map</text>

  <rect x="500" y="86" width="200" height="62" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="600" y="126" text-anchor="middle" font-size="22" font-family="Arial" fill="#1e3a8a">Need branching?</text>

  <rect x="180" y="210" width="240" height="72" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="300" y="256" text-anchor="middle" font-size="22" font-family="Arial" fill="#166534">if / else if / else</text>

  <rect x="780" y="210" width="240" height="72" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
  <text x="900" y="256" text-anchor="middle" font-size="22" font-family="Arial" fill="#991b1b">switch / switch expr</text>

  <rect x="500" y="320" width="200" height="62" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
  <text x="600" y="360" text-anchor="middle" font-size="22" font-family="Arial" fill="#92400e">Need repetition?</text>

  <rect x="100" y="432" width="220" height="74" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
  <text x="210" y="475" text-anchor="middle" font-size="21" font-family="Arial" fill="#075985">for</text>
  <text x="210" y="496" text-anchor="middle" font-size="14" font-family="Arial" fill="#075985">known count</text>

  <rect x="360" y="432" width="220" height="74" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
  <text x="470" y="475" text-anchor="middle" font-size="21" font-family="Arial" fill="#4c1d95">while</text>
  <text x="470" y="496" text-anchor="middle" font-size="14" font-family="Arial" fill="#4c1d95">condition-driven</text>

  <rect x="620" y="432" width="220" height="74" rx="12" fill="#ecfccb" stroke="#65a30d" stroke-width="3"/>
  <text x="730" y="475" text-anchor="middle" font-size="21" font-family="Arial" fill="#365314">do-while</text>
  <text x="730" y="496" text-anchor="middle" font-size="14" font-family="Arial" fill="#365314">run at least once</text>

  <rect x="880" y="432" width="220" height="74" rx="12" fill="#ffe4e6" stroke="#e11d48" stroke-width="3"/>
  <text x="990" y="475" text-anchor="middle" font-size="21" font-family="Arial" fill="#9f1239">break/continue</text>
  <text x="990" y="496" text-anchor="middle" font-size="14" font-family="Arial" fill="#9f1239">flow control keywords</text>

  <g stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <line x1="600" y1="148" x2="300" y2="208"/>
    <line x1="600" y1="148" x2="900" y2="208"/>
    <line x1="600" y1="148" x2="600" y2="318"/>
    <line x1="600" y1="382" x2="210" y2="430"/>
    <line x1="600" y1="382" x2="470" y2="430"/>
    <line x1="600" y1="382" x2="730" y2="430"/>
    <line x1="600" y1="382" x2="990" y2="430"/>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
  </defs>
</svg>
