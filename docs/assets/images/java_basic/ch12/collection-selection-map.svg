<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="540" viewBox="0 0 1180 540">
  <rect width="1180" height="540" fill="#f8fafc"/>
  <text x="590" y="44" text-anchor="middle" font-size="30" font-family="Arial" fill="#0f172a">Collection Selection Map</text>

  <rect x="90" y="90" width="1000" height="390" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="3"/>

  <rect x="470" y="130" width="240" height="62" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="590" y="168" text-anchor="middle" font-size="22" font-family="Arial" fill="#1e3a8a">Need key-value?</text>

  <rect x="810" y="250" width="220" height="72" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="920" y="292" text-anchor="middle" font-size="21" font-family="Arial" fill="#991b1b">Map</text>
  <text x="920" y="314" text-anchor="middle" font-size="14" font-family="Arial" fill="#991b1b">HashMap / TreeMap</text>

  <rect x="160" y="250" width="220" height="72" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="270" y="292" text-anchor="middle" font-size="21" font-family="Arial" fill="#166534">List</text>
  <text x="270" y="314" text-anchor="middle" font-size="14" font-family="Arial" fill="#166534">ArrayList / LinkedList</text>

  <rect x="470" y="250" width="220" height="72" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="580" y="292" text-anchor="middle" font-size="21" font-family="Arial" fill="#92400e">Set</text>
  <text x="580" y="314" text-anchor="middle" font-size="14" font-family="Arial" fill="#92400e">HashSet / TreeSet</text>

  <text x="160" y="388" font-size="17" font-family="Arial" fill="#334155">List: ordered, duplicates allowed</text>
  <text x="160" y="418" font-size="17" font-family="Arial" fill="#334155">Set: unique elements, no duplicates</text>
  <text x="160" y="448" font-size="17" font-family="Arial" fill="#334155">Map: key -> value, unique keys</text>

  <g stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <line x1="470" y1="162" x2="272" y2="248"/>
    <line x1="590" y1="192" x2="580" y2="248"/>
    <line x1="710" y1="162" x2="918" y2="248"/>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
  </defs>
</svg>

