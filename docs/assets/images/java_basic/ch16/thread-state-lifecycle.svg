<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560">
  <rect width="1180" height="560" fill="#f8fafc"/>
  <text x="590" y="44" text-anchor="middle" font-size="30" font-family="Arial" fill="#0f172a">Thread State Lifecycle (Java)</text>

  <rect x="90" y="90" width="1000" height="420" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="3"/>

  <rect x="120" y="240" width="150" height="70" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="195" y="282" text-anchor="middle" font-size="19" font-family="Arial" fill="#1e3a8a">NEW</text>

  <rect x="330" y="240" width="180" height="70" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="420" y="282" text-anchor="middle" font-size="19" font-family="Arial" fill="#166534">RUNNABLE</text>

  <rect x="570" y="150" width="180" height="70" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="660" y="192" text-anchor="middle" font-size="19" font-family="Arial" fill="#92400e">BLOCKED</text>

  <rect x="570" y="330" width="180" height="70" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="660" y="372" text-anchor="middle" font-size="19" font-family="Arial" fill="#92400e">WAITING</text>

  <rect x="810" y="330" width="220" height="70" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="920" y="372" text-anchor="middle" font-size="19" font-family="Arial" fill="#92400e">TIMED_WAITING</text>

  <rect x="810" y="240" width="180" height="70" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="900" y="282" text-anchor="middle" font-size="19" font-family="Arial" fill="#991b1b">TERMINATED</text>

  <g stroke="#334155" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <line x1="270" y1="275" x2="328" y2="275"/>
    <line x1="510" y1="255" x2="568" y2="205"/>
    <line x1="510" y1="295" x2="568" y2="345"/>
    <line x1="750" y1="345" x2="808" y2="365"/>
    <line x1="750" y1="185" x2="420" y2="240"/>
    <line x1="750" y1="365" x2="420" y2="310"/>
    <line x1="1030" y1="365" x2="420" y2="300"/>
    <line x1="510" y1="275" x2="808" y2="275"/>
  </g>

  <text x="300" y="500" font-size="17" font-family="Arial" fill="#334155">Transitions depend on lock contention, wait/notify, sleep, join, and task completion.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
  </defs>
</svg>

