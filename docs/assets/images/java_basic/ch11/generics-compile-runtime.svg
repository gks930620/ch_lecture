<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520">
  <rect width="1180" height="520" fill="#f8fafc"/>
  <text x="590" y="44" text-anchor="middle" font-size="30" font-family="Arial" fill="#0f172a">Generics: Compile-Time Safety vs Runtime Erasure</text>

  <rect x="90" y="90" width="470" height="380" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="325" y="126" text-anchor="middle" font-size="22" font-family="Arial" fill="#166534">Compile Time</text>
  <text x="130" y="172" font-size="18" font-family="Courier New" fill="#166534">List&lt;String&gt; names = new ArrayList&lt;&gt;();</text>
  <text x="130" y="206" font-size="18" font-family="Courier New" fill="#166534">names.add("Kim");</text>
  <text x="130" y="240" font-size="18" font-family="Courier New" fill="#166534">// names.add(123);  // compile error</text>
  <text x="130" y="286" font-size="17" font-family="Arial" fill="#166534">Type mismatch caught before execution</text>
  <text x="130" y="318" font-size="17" font-family="Arial" fill="#166534">No manual cast when reading elements</text>

  <rect x="620" y="90" width="470" height="380" rx="14" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
  <text x="855" y="126" text-anchor="middle" font-size="22" font-family="Arial" fill="#991b1b">Runtime</text>
  <text x="660" y="172" font-size="18" font-family="Courier New" fill="#991b1b">List&lt;String&gt; -> List (type erasure)</text>
  <text x="660" y="206" font-size="18" font-family="Courier New" fill="#991b1b">Generic type info mostly removed</text>
  <text x="660" y="240" font-size="18" font-family="Courier New" fill="#991b1b">Cannot do: new T(), T.class</text>
  <text x="660" y="286" font-size="17" font-family="Arial" fill="#991b1b">Bridge methods may be generated by compiler</text>
  <text x="660" y="318" font-size="17" font-family="Arial" fill="#991b1b">Use bounds/wildcards for safe APIs</text>

  <g stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <line x1="560" y1="280" x2="618" y2="280"/>
  </g>
  <text x="590" y="268" text-anchor="middle" font-size="14" font-family="Arial" fill="#334155">compiled</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
  </defs>
</svg>

